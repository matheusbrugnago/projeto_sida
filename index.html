<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIDA with Jitsu</title>
    
    <script src='https://meet.jit.si/external_api.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* --- TELA DE LOGIN --- */
        #login-screen {
            display: flex;
            height: 100vh;
            width: 100vw;
            background-color: #d1e9ff; 
        }

        .login-left {
            flex: 1;
            background: url("./Imagens/SIDA.png");
            background-size: cover;
            background-position: center;
        }

        .login-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background-color: #d1e9ff; 
        }

        .login-box { 
            width: 100%; 
            max-width: 350px; 
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .login-box h2 { color: #2c3e50; margin-bottom: 20px; }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        .login-footer { margin-top: 20px; font-size: 0.85em; color: #7f8c8d; }
        .login-footer a { color: #3498db; text-decoration: none; }

        /* --- TELA DO SISTEMA --- */
        #app-screen { display: none; height: 100vh; flex-direction: column; }
        
        .header {
            display: flex;
            justify-content: space-between; /* Espalha os 3 elementos (Título, Link, Botões) */
            align-items: center;
            padding: 0 20px;
            background: #2c3e50;
            height: 70px;
        }
        .header-buttons {
            display: flex;
            gap: 10px; /* Cria o espaço de 10px entre o Ativar Tradução e o Sair */
            align-items: center;
        }

        .share-area {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 8px;
            border: 1px solid #34495e;
        }

        /* --- BOTÃO ATIVAR TRADUÇÃO (RECUPERADO) --- */
        #btn-tradutor {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap; /* Impede que o texto quebre em duas linhas */
        }
        #btn-sair {
            background: #c0392b; /* Um tom de vermelho levemente diferente para o Sair */
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        #btn-tradutor:hover { background: #c0392b; }

        .main-content { display: grid; grid-template-columns: 1fr 300px; height: calc(100vh - 70px); background: #000; }
        #meet-container { width: 100%; height: 100%; }
        
        .sidebar { 
            background: #ecf0f1; 
            display: flex; 
            flex-direction: column; 
            padding: 15px; 
            height: 100%; 
            box-sizing: border-box; 
            overflow: hidden; 
        }

        #chat-ia { 
            flex: 1; 
            background: white; 
            border-radius: 5px; 
            padding: 10px; 
            overflow-y: auto; 
            border: 1px solid #ddd; 
            margin-bottom: 15px; 
        }

        #btn-voz { 
            width: 100%;
            background: #3498db; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold;
            flex-shrink: 0; 
        }
        
        /* Posicionamento VLibras na Esquerda */
        div[vw].enabled { left: 20px !important; right: auto !important; }
        [vw-access-button] { left: 0 !important; right: auto !important; top: 50% !important; transform: translateY(-50%) !important; }
        .vw-plugin-wrapper { left: 0 !important; right: auto !important; }
    </style>
</head>
<body>

    <div id="login-screen">
    <div class="login-left"></div>
    <div class="login-right">
        <div class="login-box">
            <h2 id="login-title">Entrar no SIDA</h2>
            <p id="login-subtitle">Entre com suas credenciais para acessar a sala.</p>
            
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="password" placeholder="Senha">

            <div id="register-extras" style="display: none;">
                <input type="text" id="display-name" placeholder="Nome Completo">
                <select id="user-type" style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #ddd;">
                    <option value="surdo">Eu sou Surdo (Usar IA de Sinais)</option>
                    <option value="ouvinte">Eu sou Ouvinte (Usar Voz)</option>
                </select>
            </div>

            <button class="btn-login" id="btn-main" onclick="acaoPrincipal()">ENTRAR</button>
            
            <div class="login-footer">
                <span id="footer-text">Não tem conta?</span> 
                <a href="javascript:void(0)" id="toggle-link" onclick="toggleAuthMode()">Cadastre-se</a>
                <br><br>
                <a href="javascript:void(0)" onclick="resetarSenha()">Esqueceu a senha?</a>
            </div>
        </div>
    </div>
</div>

    <div id="app-screen">
        <header class="header">
            <span>SIDA ALPHA 26.05.10</span>
            
            <div class="share-area">
                <span id="link-reuniao" style="font-size: 0.85em; color: #bdc3c7;">Gerando link...</span>
                <button onclick="copiarLink()" style="background: #3498db; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.75em;">
                    📋 Copiar
                </button>
            </div>
            <div class="header-buttons">
                <button id="btn-tradutor" onclick="initIA()">Ativar Tradução</button>
                <button id="btn-sair" onclick="fazerLogout()">Sair</button>
            </div>   
        </header>

        <main class="main-content">
            <div id="meet-container"></div>
            <aside class="sidebar">
                <h3>Chat Automático</h3>
                <div id="chat-ia"></div>
                <button id="btn-voz" onclick="iniciarReconhecimentoVoz()" style="display:none;">
                    🎙️ Gravar Áudio
                </button>
            </aside>
        </main>
    </div>

    <div id="webcam-container" style="display:none;"></div>

    <script type="module" src="app.js"></script>

    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>
</body>
</html>
