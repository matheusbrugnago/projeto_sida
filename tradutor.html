<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SIDA - Tradutor LIBRAS Inteligente</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #eef2f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h2 { color: #1e293b; margin-bottom: 5px; }
        .sub { color: #64748b; margin-bottom: 20px; font-size: 0.95rem; }
        
        .video-container {
            position: relative;
            width: 640px;
            height: 480px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        #webcam {
            transform: scaleX(-1);
            width: 100%;
            height: 100%;
        }
        #output_canvas {
            position: absolute;
            left: 0;
            top: 0;
            transform: scaleX(-1);
            width: 100%;
            height: 100%;
        }
        
        .resultado-box {
            margin-top: 20px;
            background: white;
            padding: 25px;
            border-radius: 16px;
            width: 590px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .palavra-atual { 
            font-size: 1.3rem; 
            color: #475569; 
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px dashed #e2e8f0;
        }
        .frase-container {
            background: #f8fafc;
            border-radius: 8px;
            padding: 15px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .frase-final { 
            font-size: 1.8rem; 
            font-weight: bold; 
            color: #0f172a; 
        }
        
        .btn-clear {
            margin-top: 15px;
            background: #e11d48;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-clear:hover { background: #be123c; }
    </style>
</head>
<body>

    <h2>Tradutor de LIBRAS em Tempo Real</h2>
    <div class="sub">Posicione sua mão em frente à câmera para iniciar a formação da frase</div>

    <div class="video-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div class="resultado-box">
        <div class="palavra-atual">Sinal Atual: <span id="sinal-detectado" style="color:#2563eb; font-weight:bold;">Carregando...</span></div>
        
        <div class="frase-container">
            <div class="frase-final" id="frase-texto">...</div>
        </div>
        
        <button class="btn-clear" onclick="limparFrase()">Limpar Frase</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script type="module">
        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        const textSinal = document.getElementById("sinal-detectado");
        const textFrase = document.getElementById("frase-texto");

        // VARIÁVEIS DE CONTROLE DA FRASE (Mecânica de Buffer)
        let palavraEstabilizada = "";
        let ultimaPalavraAdicionada = "";
        let listaPalavrasFrase = [];
        let contadorFramesSinalAtual = 0;
        const FRAMES_NECESSARIOS_PARA_CONFIRMAR = 15; // Roda a ~30fps, então precisa segurar por 0.5 segundos

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1, // Focado em 1 mão para simplificar o rastreamento inicial
            modelComplexity: 1,
            minDetectionConfidence: 0.7, // Aumentado para evitar falsos positivos
            minTrackingConfidence: 0.7
        });

        hands.onResults((results) => {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // Desenha a malha geométrica na tela
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#27ae60', lineWidth: 4});
                drawLandmarks(canvasCtx, landmarks, {color: '#e74c3c', lineWidth: 1});

                // Descobre qual sinal está sendo feito baseado nas coordenadas
                let sinalDetectadoAgora = analisarSinalLibras(landmarks);
                textSinal.innerText = sinalDetectadoAgora;

                // MOTOR GERADOR DE FRASES (Lógica temporal)
                if (sinalDetectadoAgora !== "Nenhum" && sinalDetectadoAgora !== "Mão Indefinida") {
                    if (sinalDetectadoAgora === palavraEstabilizada) {
                        contadorFramesSinalAtual++;
                        
                        // Se o sinal persistiu estável pelo tempo mínimo configurado...
                        if (contadorFramesSinalAtual >= FRAMES_NECESSARIOS_PARA_CONFIRMAR) {
                            // Verifica se não é uma repetição direta da última palavra adicionada
                            if (sinalDetectadoAgora !== ultimaPalavraAdicionada) {
                                listaPalavrasFrase.push(sinalDetectadoAgora);
                                ultimaPalavraAdicionada = sinalDetectadoAgora;
                                
                                // Renderiza a frase formatada na tela
                                textFrase.innerText = listaPalavrasFrase.join(" ");
                            }
                            contadorFramesSinalAtual = 0; // Reseta o contador após registrar
                        }
                    } else {
                        // Se mudou de sinal no meio do caminho, começa a contar do zero para o novo sinal
                        palavraEstabilizada = sinalDetectadoAgora;
                        contadorFramesSinalAtual = 0;
                    }
                }
            } else {
                textSinal.innerText = "Nenhuma mão visível";
                contadorFramesSinalAtual = 0;
            }
        });

        const camera = new Camera(video, {
            onFrame: async () => {
                canvasElement.width = video.videoWidth;
                canvasElement.height = video.videoHeight;
                await hands.send({image: video});
            },
            width: 640,
            height: 480
        });

        camera.start().then(() => textSinal.innerText = "Aguardando sinal...");

        // FUNÇÃO PARA EXCLUIR O HISTÓRICO DA FRASE
        window.limparFrase = function() {
            listaPalavrasFrase = [];
            ultimaPalavraAdicionada = "";
            palavraEstabilizada = "";
            contadorFramesSinalAtual = 0;
            textFrase.innerText = "...";
        };

        function analisarSinalLibras(landmarks) {
            // 1. MAPEAMENTO SE OS DEDOS ESTÃO ESTICADOS PARA CIMA (ABERTOS)
            const indicadorAberto = landmarks[8].y < landmarks[6].y;
            const medioAberto     = landmarks[12].y < landmarks[10].y;
            const anelarAberto     = landmarks[16].y < landmarks[14].y;
            const minimoAberto     = landmarks[20].y < landmarks[18].y;
     
            // 2. CONFIGURAÇÕES COMPLEMENTARES DE POSTURA
            // Mão totalmente aberta (quatro dedos para cima)
            const quatroDedosAbertos = indicadorAberto && medioAberto && anelarAberto && minimoAberto;
            const quatroDedosFechados = !indicadorAberto && !medioAberto && !anelarAberto && !minimoAberto;

            // Medição de curvatura (Meio termo: nem aberto, nem fechado - Usado para o C)
            const indicadorCurvado = landmarks[8].y > landmarks[6].y && landmarks[8].y < landmarks[5].y;
            const medioCurvado     = landmarks[12].y > landmarks[10].y && landmarks[12].y < landmarks[9].y;
            const anelarCurvado    = landmarks[16].y > landmarks[14].y && landmarks[16].y < landmarks[13].y;
            const minimoCurvado    = landmarks[20].y > landmarks[18].y && landmarks[20].y < landmarks[17].y;

            // 3. COORDENADAS DO POLEGAR (Ponto 4) E DISTÂNCIAS
            const polegarX = landmarks[4].x;
            const polegarY = landmarks[4].y;

            // Verificação de proximidade em relação ao polegar
            const indicadorNoPolegar = Math.abs(landmarks[8].x - polegarX) < 0.08 && Math.abs(landmarks[8].y - polegarY) < 0.08;
            const medioNoPolegar     = Math.abs(landmarks[12].x - polegarX) < 0.08 && Math.abs(landmarks[12].y - polegarY) < 0.08;
            const anelarNoPolegar    = Math.abs(landmarks[16].x - polegarX) < 0.08 && Math.abs(landmarks[16].y - polegarY) < 0.08;
            const minimoNoPolegar    = Math.abs(landmarks[20].x - polegarX) < 0.08 && Math.abs(landmarks[20].y - polegarY) < 0.08;
            
            // Histórico para armazenar as coordenadas (X, Y) da ponta do indicador
            let historicoMovimentoZ = []; 
            const MAX_FRAMES_HISTORICO = 20; // Quantidade de frames gravados para o desenho

            // Timer para manter a letra Z visível após o gesto terminar
            let zDetectadoTimer = 0;

            // 4. REGRA EXATA PARA A LETRA C (Construída com a sua lógica)

            // Passo 1: Alinhamento X dos quatro dedos superiores (compara com o indicador)
            const medioAlinhadoX  = Math.abs(landmarks[12].x - landmarks[8].x) < 0.06;
            const anelarAlinhadoX  = Math.abs(landmarks[16].x - landmarks[8].x) < 0.06;
            const minimoAlinhadoX  = Math.abs(landmarks[20].x - landmarks[8].x) < 0.06;
            const quatroDedosAlinhadosX = medioAlinhadoX && anelarAlinhadoX && minimoAlinhadoX;

            // Passo 2: Ponta do polegar alinhada no eixo X com a ponta do indicador
            const polegarAlinhadoComIndicadorX = Math.abs(landmarks[4].x - landmarks[8].x) < 0.08;

            // Passo 3: Y do polegar abaixo do Y do indicador (lembrando: mais baixo = maior Y)
            const polegarAbaixoDoIndicadorY = landmarks[4].y > landmarks[16].y;

            // Passo 4: Garantir que há uma abertura vertical mínima para não confundir com a mão fechada
            const aberturaVerticalMao = Math.abs(landmarks[4].y - landmarks[8].y) > 0.15;

            // 5. REGRA EXATA PARA A LETRA D (Baseada no seu print)

            // Passo 1: Garantir que apenas o indicador está esticado para cima
            const indicadorEsticadoD = landmarks[8].y < landmarks[6].y;
            const medioAbaixadoD = landmarks[12].y > landmarks[10].y;
            const anelarAbaixadoD = landmarks[16].y > landmarks[14].y;
            const minimoAbaixadoD = landmarks[20].y > landmarks[18].y;

            // Passo 2: Mapear o círculo (distância entre as pontas dos 3 dedos e a ponta do polegar Ponto 4)
            // Usamos Math.abs para checar a diferença horizontal(x) e vertical(y)
            const distanciaMedioPolegarD = Math.abs(landmarks[12].x - landmarks[4].x) < 0.08 && Math.abs(landmarks[12].y - landmarks[4].y) < 0.08;
            const distanciaAnelarPolegarD = Math.abs(landmarks[16].x - landmarks[4].x) < 0.08 && Math.abs(landmarks[16].y - landmarks[4].y) < 0.08;
            const distanciaMinimoPolegarD = Math.abs(landmarks[20].x - landmarks[4].x) < 0.08 && Math.abs(landmarks[20].y - landmarks[4].y) < 0.08;

            // Passo 3: Garantir que o polegar não está esticado para o lado (como no C)
            const polegarRecolhidoD = landmarks[4].y > landmarks[10].y;

            // 7. REGRA EXATA PARA A LETRA F (Baseada no seu print)
            // Os dedos médio, anelar e mínimo ficam abertos/esticados para cima
            const dedosSuperioresAbertosF = medioAberto && anelarAberto && minimoAberto;
            const polegarAlto = landmarks[4].y<landmarks[8].y
            const polegarADireitaF = landmarks[4].x>landmarks[8].x;
            const PulsoSuperiorF = landmarks[4].y<landmarks[0].y

            // =======================================================
            // 8. REGRA CORRIGIDA PARA A LETRA G
            // =======================================================
            const posturaDedosG = indicadorAberto && !medioAberto && !anelarAberto && !minimoAberto;

            // No G, a ponta do polegar (4) fica na altura da junta da base do indicador (6)
            const polegarAlinhadoJuntaG = Math.abs(landmarks[4].y - landmarks[5].y) < 0.1;

            const polegarADireita= landmarks[4].x>landmarks[5].x && landmarks[4].x>landmarks[6].x
            
            // Garante que o polegar NÃO está super afastado para o lado (o que seria um L)
            const polegarProximoG = Math.abs(landmarks[4].x - landmarks[6].x) < 0.08;
            
            // O indicador fica abaixado/dobrado para encontrar o polegar
            const indicadorAbaixadoF = !indicadorAberto;

            // Mede a proximidade entre a ponta do indicador (8) e a ponta do polegar (4)
            const indicadorNoPolegarF = Math.abs(landmarks[8].x - polegarX) < 0.08 && Math.abs(landmarks[8].y - polegarY) < 0.08;

            // 9. REGRAS DE CONFLITO: LETRA H vs LETRA K
            const posturaDedosHeK = indicadorAberto && medioAberto && !anelarAberto && !minimoAberto;

            // Altura do polegar (4) emparelhada/no meio das articulações do indicador (6) e médio (10)
            const polegarNoMeioH = landmarks[4].y < landmarks[6].y && landmarks[4].y > landmarks[12].y;

            // 10. REGRAS DE CONFLITO: LETRA I vs LETRA J vs SINAL "OI"
            const apenasMinimoAberto = minimoAberto && !indicadorAberto && !medioAberto && !anelarAberto;
            const polegarFechadoI = landmarks[4].x<landmarks[2].x

            // =======================================================
            // 11. REGRA BLINDADA PARA A LETRA L
            // =======================================================
            const posturaDedosL = indicadorAberto && !medioAberto && !anelarAberto && !minimoAberto;

            // No L real, o polegar se afasta horizontalmente (eixo X) da estrutura da mão
            const polegarAfastadoL = Math.abs(landmarks[5].x - landmarks[4].x) > 0.09;

            // TRAVA DE SEGURANÇA: No L, o indicador (8) DEVE estar apontado para cima.
            // Ou seja, a ponta (8) precisa estar muito mais alta (Y menor) que a sua junta base (5).
            // No P deitado, essa diferença vertical é minúscula, o que vai impedir o L de ativar por erro.
            const indicadorEmPeL = (landmarks[5].y - landmarks[8].y) > 0.15;

            // =======================================================
            // 12. REGRA ROBUSTECIDA PARA A LETRA M (Resolvendo conflito com 'A')
            // =======================================================
            // Na Letra M, as pontas do Indicador(8), Médio(12) e Anelar(16) ficam ABAIXO de suas bases (Y maior)
            const indicadorParaBaixoM = landmarks[8].y > landmarks[7].y;
            const medioParaBaixoM = landmarks[12].y > landmarks[11].y;
            const anelarParaBaixoM = landmarks[16].y > landmarks[15].y;
            const postureDedosDownM = indicadorParaBaixoM && medioParaBaixoM && anelarParaBaixoM;
            const anelarLevantado= landmarks[20].y<landmarks[6].y;

            // =======================================================
            // 13. REGRA EXATA PARA A LETRA N (Baseada no seu print)
            // =======================================================
            // Na Letra N, apenas as pontas do Indicador(8) e do Médio(12) ficam ABAIXO de suas bases (Y maior)
            const indicadorParaBaixoN = landmarks[8].y > landmarks[7].y;
            const medioParaBaixoN = landmarks[12].y > landmarks[11].y;
            const variavelPulso = landmarks[0].y<landmarks[8].y;

            // Junta as condições dos dedos principais do N
            const posturaDedosDownN = indicadorParaBaixoN && medioParaBaixoN;
            const distanciaDedosD = Math.abs(landmarks[12].y - landmarks[8].y) < 0.05;

            // Mantém a sua lógica inteligente de alinhamento de base para não confundir com o 'A'
            const basePolegarAlinhadaBaseIndicadorYN = Math.abs(landmarks[1].y - landmarks[5].y) < 0.20;

            // =======================================================
            // 15. REGRA DA LETRA P (Sua lógica matemática pura)
            // =======================================================
            // Validação Vertical (Eixo Y): Indicador mais alto que Polegar, que é mais alto que o Médio
            const hierarquiaVerticalP = landmarks[8].y < landmarks[4].y && landmarks[4].y < landmarks[12].y;
            // Ponta 5 Maior que Ponta 8
            const Ponta5Maiorque8P = landmarks[5].y < landmarks[8].y

            // Validação Horizontal (Eixo X): Pontas do Anelar e Mindinho à direita (maior X) que o Polegar
            const anelarDireitaPolegarP = landmarks[16].x < landmarks[4].x;
            const mindinhoDireitaPolegarP = landmarks[20].x < landmarks[4].x;

            // =======================================================
            // 16. REGRA EXATA PARA A LETRA Q (G de cabeça para baixo)
            // =======================================================
            // Na Letra Q, a ponta do Indicador(8) fica fisicamente ABAIXO da base da palma(0) (Y maior)
            const indicadorParaBaixoQ = landmarks[8].y > landmarks[0].y;
            const dedosFechadosQ = landmarks[8].y > landmarks[12].y && landmarks[8].y > landmarks[16].y && landmarks[8].y > landmarks[20].y;

            // O indicador deve estar esticado para baixo (vamos usar o afastamento vertical)
            // A ponta (8) está bem mais baixa que a sua junta base (5)
            const indicadorEsticadoQ = Math.abs(landmarks[8].y - landmarks[5].y) > 0.5;
            
            // =======================================================
            // 17. REGRA EXATA PARA A LETRA R (Dedos Cruzados)
            // =======================================================
            // Indicador e Médio abertos, Anelar e Mínimo fechados
            const posturaDedosBaseR = indicadorAberto && medioAberto && !anelarAberto && !minimoAberto;

            // O grande segredo: A inversão horizontal das pontas devido ao cruzamento.
            // A ponta do médio (12) fica à esquerda (menor X) da ponta do indicador (8).
            const dedosCruzadosX = landmarks[12].x >= landmarks[8].x;
            const polegarAbaixoMedio = landmarks[4].y>landmarks[12].y;

            // Garante que ambos estão apontando para cima de forma firme
            const indicadorEmPeR = landmarks[8].y < landmarks[5].y;
            const medioEmPeR = landmarks[12].y < landmarks[9].y;

            // =======================================================
            // 18. REGRA EXATA PARA A LETRA S (Punho fechado com polegar à frente)
            // =======================================================
            // Todos os 4 dedos principais precisam estar completamente fechados
            const todosFechadosS = !indicadorAberto && !medioAberto && !anelarAberto && !minimoAberto;

            // 1. SUA REGRA DE ALTURA VERTICAL (Eixo Y):
            // A ponta do polegar (4) fica acima ou na mesma altura que o Y da ponta do mindinho (20)
            const polegarAcimaMindinhoS = landmarks[4].y < landmarks[20].y;
            const polegarAcimaIndicadorS = landmarks[10].y < landmarks[8].y;
            const polegarAEsrquerdaS= landmarks[4].x<landmarks[2].x;

            // =======================================================
            // 19. REGRA EXATA PARA A LETRA T (Baseada no seu print image_2f6067.jpg)
            // =======================================================
            // Postura base: Apenas o indicador aberto para cima, os demais fechados
            const posturaDedosTBase = medioAberto && anelarAberto && minimoAberto;
            const baseDedo = landmarks[4].y<=landmarks[8].y;
            const indicadorDireita = landmarks[8].x>landmarks[4].x

            // =======================================================
            // 20. REGRA EXATA PARA A LETRA U (Indicador e Médio Juntos)
            // =======================================================
            // Postura base: Indicador e Médio abertos, Anelar e Mínimo fechados
            const posturaDedosBaseU = indicadorAberto && medioAberto && !anelarAberto && !minimoAberto;

            // No U, os dois dedos precisam estar bem colados horizontalmente.
            // A distância no eixo X entre a ponta 8 e a ponta 12 deve ser bem pequena.
            const dedosColadosU = Math.abs(landmarks[8].x - landmarks[12].x) < 0.10;

            // Ambos os dedos apontando firmemente para cima (Y menor que suas bases)
            const indicadorEmPeU = landmarks[8].y < landmarks[5].y;
            const medioEmPeU = landmarks[12].y < landmarks[9].y;

            // =======================================================
            // 21. REGRA EXATA PARA A LETRA V (Indicador e Médio Afastados)
            // =======================================================
            // Postura base: Indicador e Médio abertos, Anelar e Mínimo fechados
            const posturaDedosBaseV = indicadorAberto && medioAberto && !anelarAberto && !minimoAberto;

            // No V, os dois dedos precisam estar bem AFASTADOS horizontalmente.
            // Medimos a distância no eixo X entre a ponta 8 e a ponta 12.
            const dedosAfastadosV = Math.abs(landmarks[8].x - landmarks[12].x) >= 0.05;

            // Ambos os dedos apontando firmemente para cima (Y menor que suas bases)
            const indicadorEmPeV = landmarks[8].y < landmarks[5].y;
            const medioEmPeV = landmarks[12].y < landmarks[9].y;

            // =======================================================
            // 22. REGRA EXATA PARA A LETRA W (Tridente Afastado)
            // =======================================================
            // Postura base: Indicador, Médio e Anelar abertos. Mínimo fechado.
            const posturaDedosBaseW = indicadorAberto && medioAberto && anelarAberto && !minimoAberto;

            // Garantir que os três dedos estão apontando firmemente para cima (Y menor que as juntas bases)
            const indicadorEmPeW = landmarks[8].y < landmarks[5].y;
            const medioEmPeW = landmarks[12].y < landmarks[9].y;
            const anelarEmPeW = landmarks[16].y < landmarks[13].y;

            // Validação de Afastamento Horizontal (Eixo X): 
            // O indicador (8) fica bem à esquerda do médio (12), e o anelar (16) bem à direita.
            const indicadorAfastadoW = (landmarks[8].x - landmarks[12].x) > 0.04;
            const anelarAfastadoW = (landmarks[12].x - landmarks[16].x) > 0.04;

            // =======================================================
            // 23. REGRA EXATA PARA A LETRA X (O Gancho do Capitão)
            // =======================================================
            // Postura base: Médio, Anelar e Mínimo precisam estar fechados
            const posturaDedosBaseX = !medioAberto && !anelarAberto && !minimoAberto;

            // =======================================================
            // 24. REGRA ADICIONADA PARA A LETRA Z (Movimento Dinâmico)
            // =======================================================
            
            // Postura Base do Z: Apenas o indicador levantado para cima (idêntico ao D)
            const posturaDedosBaseZ = indicadorAberto && !medioAberto && !anelarAberto && !minimoAberto;

            if (posturaDedosBaseZ) {
                // Captura a posição atual da ponta do indicador (ponto 8)
                const pontoAtual8 = { x: landmarks[8].x, y: landmarks[8].y };
                
                // Adiciona ao início do histórico
                historicoMovimentoZ.unshift(pontoAtual8);
                
                // Limita o tamanho do histórico para não vazar memória
                if (historicoMovimentoZ.length > MAX_FRAMES_HISTORICO) {
                    historicoMovimentoZ.pop();
                }

                // Só tenta validar o Z se o histórico estiver cheio de movimentos
                if (historicoMovimentoZ.length >= 15) {
                    // Pega pontos chave no tempo (do mais antigo para o mais recente)
                    const inicial = historicoMovimentoZ[historicoMovimentoZ.length - 1]; // Início do gesto
                    const meioIda = historicoMovimentoZ[Math.floor(historicoMovimentoZ.length * 0.7)];
                    const verticeSuperior = historicoMovimentoZ[Math.floor(historicoMovimentoZ.length * 0.5)]; // Canto superior direito
                    const verticeInferior = historicoMovimentoZ[Math.floor(historicoMovimentoZ.length * 0.25)]; // Canto inferior esquerdo
                    const final = historicoMovimentoZ[0]; // Fim do gesto

                    // 1. Validar o traço horizontal superior (Esquerda -> Direita)
                    const tracoSuperiorHorizontal = verticeSuperior.x > inicial.x + 0.05 && 
                                                    Math.abs(verticeSuperior.y - inicial.y) < 0.08;

                    // 2. Validar a diagonal descendente (Direita -> Esquerda / Cima -> Baixo)
                    const diagonalDescendente = verticeInferior.x < verticeSuperior.x - 0.05 && 
                                                verticeInferior.y > verticeSuperior.y + 0.05;

                    // 3. Validar o traço horizontal inferior (Esquerda -> Direita)
                    const tracoInferiorHorizontal = final.x > verticeInferior.x + 0.05 && 
                                                    Math.abs(final.y - verticeInferior.y) < 0.08;

                    if (tracoSuperiorHorizontal && diagonalDescendente && tracoInferiorHorizontal) {
                        zDetectadoTimer = 30; // Mantém o "Z" ativo na tela por 30 frames
                        historicoMovimentoZ = []; // Limpa o rastro para não redetectar em loop
                    }
                }
            } else {
                // Se o usuário fechar a mão ou mudar de pose, limpa o rastro do Z
                historicoMovimentoZ = [];
            }

            // 1. O SEGREDO DO GANCHO: A junta do meio (6) fica MAIS ALTA (Y menor) que a ponta do dedo (8)
            const indicadorEmGanchoX = Math.abs(landmarks[6].y - landmarks[8].y)<0.2;

            // 2. O dedo continua erguido: A junta do meio (6) está bem acima da junta da base (5)
            const indicadorErguidoX = landmarks[6].y < landmarks[5].y;

            // 3. Trava de segurança para o polegar: Ele fica recolhido próximo à palma, abaixo do gancho
            const polegarAbaixoGanchoX = landmarks[4].y > landmarks[6].y;

            const pontaIndicadorMaiorqueMeioMedio = landmarks[10].y>landmarks[8].y
    
            // 2. REGRA EXATA PARA A LETRA A (Baseada no seu print)
            // Se os 4 dedos principais estão fechados E a ponta do polegar (4) está mais alta que a junta do indicador (6)
            if (quatroDedosFechados && landmarks[4].y < landmarks[6].y && landmarks[0].y>landmarks[4].y) {
                return "A";
            }
            // Se os 4 dedos estão esticados E o polegar (4) está recolhido para dentro (X maior que a base do indicador 5)
            if (quatroDedosAbertos && landmarks[4].y > landmarks[5].y) {
                return "B";
            }
            // Validação final usando os seus critérios:
            if (quatroDedosAlinhadosX && polegarAlinhadoComIndicadorX && polegarAbaixoDoIndicadorY && aberturaVerticalMao) {
                return "C";
            }
            // Validação final da postura:
            if (indicadorEsticadoD && medioAbaixadoD && anelarAbaixadoD && minimoAbaixadoD && 
            distanciaMedioPolegarD && distanciaAnelarPolegarD && polegarRecolhidoD) {
                return "D";
            }
            // =======================================================
            // 14. DISTINÇÃO CIRÚRGICA: LETRA O vs LETRA E
            // =======================================================
            // Ambas têm indicador, médio, anelar e mínimo flexionados (fechados)
            const todosFechadosBase = !indicadorAberto && !medioAberto && !anelarAberto && !minimoAberto;

            if (todosFechadosBase) {
                // Mede a proximidade entre a ponta do polegar (4) e a ponta do indicador (8) / médio (12)
                const distanciaPolegarIndicadorX = Math.abs(landmarks[4].x - landmarks[8].x);
                const distanciaPolegarIndicadorY = Math.abs(landmarks[4].y - landmarks[8].y);
                const distanciaPolegarMedioY = Math.abs(landmarks[4].y - landmarks[12].y);

                // REGRA PARA A LETRA O (Formato de túnel/anel arredondado)
                // No O, a ponta do polegar (4) sobe e fica muito perto da altura da ponta do indicador (8) e médio (12)
                if (distanciaPolegarIndicadorY < 0.06 && distanciaPolegarMedioY < 0.06 && distanciaPolegarIndicadorX < 0.07 && (Math.abs(landmarks[5].x - landmarks[4].x)>0.1)) {
                    return "O";
                } 
                // REGRA PARA A LETRA E (Dedos esmagados para baixo, polegar cruzando embaixo)
                // Se não passou no filtro do anel do O, mas a mão está toda encolhida
                else if (landmarks[4].y > landmarks[8].y && (Math.abs(landmarks[4].y - landmarks[8].x)>0.2) && (Math.abs(landmarks[8].y - landmarks[20].y)<0.2) ) {
                    return "E";
                }
            }
            if (dedosSuperioresAbertosF && polegarAlto && polegarADireitaF && PulsoSuperiorF ) {
                return "F";
            }
            if (posturaDedosG && polegarAlinhadoJuntaG && polegarProximoG && polegarADireita) {
                return "G";
            }
            if (posturaDedosHeK) {
                // REGRA PARA A LETRA K (Baseada no seu print)
                // Se a ponta do polegar (4) estiver alta, perto ou acima da junta do meio do dedo médio (11)
                if ((landmarks[4].y < landmarks[11].y + 0.02) && landmarks[4].x>landmarks[20].x) {
                    return "K";
                } 
                // Se o polegar estiver mais abaixo, entre o indicador e o médio -> Letra H
                else if (landmarks[4].y < landmarks[6].y && landmarks[4].x<landmarks[20].x) {
                    return "H";
                }
            }
            if (apenasMinimoAberto) {
                // REGRA PARA A LETRA J (Baseada no seu print)
                // Quando o dedinho deita em formato de gancho, a ponta (20) fica abaixo da junta do meio dele (18) ou da base (17)
                if (landmarks[6].y < landmarks[20].y && landmarks[20].x>landmarks[8].x) {
                    return "J";
                }
                // Se o dedinho continuar apontando para cima (ponta 20 mais alta)
                else {
                    // Se a ponta do polegar (4) estiver alta (Y menor que o anelar 16) -> Letra I
                    if (landmarks[4].y < landmarks[16].y && polegarFechadoI & landmarks[0].y>landmarks[4].y) {
                        return "I";
                    }
                    if (landmarks[4].y < landmarks[16].y && !polegarFechadoI && landmarks[0].y>landmarks[4].y && landmarks[20].x<landmarks[0].x){
                        return "Y";
                    }
                    // Se o polegar estiver recolhido na palma -> Sinal Oi
                    else if (indicadorNoPolegar && medioNoPolegar) {
                        return "Oi";
                    }
                }
            }
            if (posturaDedosL && polegarAfastadoL && indicadorEmPeL) {
                return "L";
            }
            if (postureDedosDownM && anelarLevantado ) {
                return "M";
            }
            if (posturaDedosDownN && basePolegarAlinhadaBaseIndicadorYN && variavelPulso && landmarks[14].y>landmarks[16].y && distanciaDedosD) {
                return "N";
            }
            if (hierarquiaVerticalP && anelarDireitaPolegarP && mindinhoDireitaPolegarP && Ponta5Maiorque8P) {
                return "P";
            }
            if (indicadorParaBaixoQ && dedosFechadosQ) {
                return "Q";
            }
            if (posturaDedosBaseR && dedosCruzadosX && indicadorEmPeR && medioEmPeR && polegarAbaixoMedio) {
                return "R";
            }
            if (todosFechadosS && polegarAcimaMindinhoS && polegarAEsrquerdaS && polegarAcimaIndicadorS) {
                return "S";
            }
            if (posturaDedosTBase && baseDedo && indicadorDireita) {
                return "T";
            }
            if (posturaDedosBaseU && dedosColadosU && indicadorEmPeU && medioEmPeU) {
                return "U";
            }
            if (posturaDedosBaseV && dedosAfastadosV && indicadorEmPeV && medioEmPeV) {
                return "V";
            }
            if (posturaDedosBaseW && indicadorEmPeW && medioEmPeW && anelarEmPeW && indicadorAfastadoW && anelarAfastadoW) {
                return "W";
            }
            if (posturaDedosBaseX && indicadorEmGanchoX && indicadorErguidoX && polegarAbaixoGanchoX && polegarAEsrquerdaS && pontaIndicadorMaiorqueMeioMedio) {
                return "X";
            }
            // Se o gesto foi feito recentemente, dá prioridade de retorno ao Z
            if (zDetectadoTimer > 0) {
                zDetectadoTimer--;
                return "Z";
            }
                return "Mão Indefinida";
        }
    </script>
